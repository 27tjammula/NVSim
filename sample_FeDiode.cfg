# 2KB FeDiode crossbar configuration
# Target: 2KB array matching the PPTX demonstration (2KB crossbar, 50nm AlScN FeDiode)

-DesignTarget: RAM

-ProcessNode: 32

-Capacity (KB): 2
-WordWidth (bit): 8

-DeviceRoadmap: LOP

-LocalWireType: LocalConservative
-LocalWireRepeaterType: RepeatedNone
-LocalWireUseLowSwing: No

-GlobalWireType: LocalConservative
-GlobalWireRepeaterType: RepeatedNone
-GlobalWireUseLowSwing: No

-Routing: non-H-tree
-InternalSensing: false

-MemoryCellInputFile: sample_FeDiode.cell

-Temperature (K): 300

-Optimization: latency

-BufferDesignOptimization: latency
